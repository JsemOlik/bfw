services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: bfw-app
        restart: unless-stopped
        ports:
            - "8000:80"
            - "5173:5173"
        volumes:
            - .:/var/www/html
            - bfw-node-modules:/var/www/html/node_modules
            - bfw-vendor:/var/www/html/vendor
        environment:
            - DB_CONNECTION=pgsql
            - DB_HOST=db
            - DB_PORT=5432
            - DB_DATABASE=${DB_DATABASE:-bfw}
            - DB_USERNAME=${DB_USERNAME:-bfw}
            - DB_PASSWORD=${DB_PASSWORD:-password}
        depends_on:
            db:
                condition: service_healthy

    db:
        image: postgres:17-alpine
        container_name: bfw-db
        restart: unless-stopped
        environment:
            - POSTGRES_DB=${DB_DATABASE:-bfw}
            - POSTGRES_USER=${DB_USERNAME:-bfw}
            - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
        volumes:
            - bfw-db-data:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-bfw} -d ${DB_DATABASE:-bfw}"]
            interval: 5s
            timeout: 5s
            retries: 5

    adminer:
        image: adminer
        container_name: bfw-adminer
        restart: unless-stopped
        ports:
            - "8080:8080"
        depends_on:
            - db

volumes:
    bfw-db-data:
    bfw-node-modules:
    bfw-vendor:
