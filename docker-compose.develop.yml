services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
            target: dev
        container_name: bfw-app
        restart: unless-stopped
        ports:
            - "8000:80"
            - "5173:5173"
        volumes:
            - .:/var/www/html
            - bfw-node-modules:/var/www/html/node_modules
            - bfw-vendor:/var/www/html/vendor
        environment:
            - DB_CONNECTION=pgsql
            - DB_HOST=db
            - DB_PORT=5432
            - DB_DATABASE=${DB_DATABASE:-bfw}
            - DB_USERNAME=${DB_USERNAME:-bfw}
            - DB_PASSWORD=${DB_PASSWORD:-password}
        depends_on:
            db:
                condition: service_healthy

    db:
        image: postgres:17-alpine
        container_name: bfw-db
        restart: unless-stopped
        environment:
            - POSTGRES_DB=${DB_DATABASE:-bfw}
            - POSTGRES_USER=${DB_USERNAME:-bfw}
            - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
        volumes:
            - bfw-db-data:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-bfw} -d ${DB_DATABASE:-bfw}"]
            interval: 5s
            timeout: 5s
            retries: 5

    dbgate:
        image: dbgate/dbgate
        container_name: bfw-dbgate
        restart: unless-stopped
        ports:
            - "3000:3000"
        depends_on:
            - db

    umami:
        image: docker.umami.is/umami-software/umami:postgresql-latest
        container_name: bfw-umami
        restart: unless-stopped
        ports:
            - "${UMAMI_PORT:-3001}:3000"
        environment:
            - DATABASE_URL=postgresql://${UMAMI_DB_USER:-umami}:${UMAMI_DB_PASSWORD:-umami-password}@umami-db:5432/${UMAMI_DB_NAME:-umami}
            - APP_SECRET=${UMAMI_APP_SECRET:-change-this-umami-secret}
            - APP_URL=${UMAMI_APP_URL:-http://localhost:3001}
            - CLIENT_IP_HEADER=${UMAMI_CLIENT_IP_HEADER:-x-forwarded-for}
        depends_on:
            umami-db:
                condition: service_healthy

    umami-db:
        image: postgres:17-alpine
        container_name: bfw-umami-db
        restart: unless-stopped
        environment:
            - POSTGRES_DB=${UMAMI_DB_NAME:-umami}
            - POSTGRES_USER=${UMAMI_DB_USER:-umami}
            - POSTGRES_PASSWORD=${UMAMI_DB_PASSWORD:-umami-password}
        volumes:
            - bfw-umami-db-data:/var/lib/postgresql/data
        ports:
            - "${UMAMI_DB_PORT:-5433}:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${UMAMI_DB_USER:-umami} -d ${UMAMI_DB_NAME:-umami}"]
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    bfw-db-data:
    bfw-umami-db-data:
    bfw-node-modules:
    bfw-vendor:
